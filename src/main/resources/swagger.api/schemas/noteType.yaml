noteType:
  type: object
  title: Note Type
  description: Defines type of note
  properties:
    id:
      $ref: 'common.yaml#/uuid'
      description: A UUID identifying this note type
      x-fqm-value-getter: ${source}.id
      x-fqm-visibility: "hidden"
      x-fqm-essential: true
    name:
      type: string
      description: The unique name of this type
      maxLength: 255
      x-fqm-value-getter: ${source}.name
      x-fqm-visibility: "all"
      x-fqm-essential: true
      x-fqm-id-column-name: id
      x-fqm-source:
        entityTypeId: 5cba8da3-3203-59a4-ad79-f91401850d9f
        columnName: name
      x-fqm-value-source-api:
        path: note-types
        valueJsonPath: $.noteTypes.*.id
        labelJsonPath: $.noteTypes.*.name
      x-fqm-visible-by-default: true
    usage:
      type: object
      readOnly: true
      description: Type usage statistics
      x-fqm-ignore: true
      properties:
        isAssigned:
          type: boolean
          readOnly: true
          description: Is this note type assigned to any note
      required:
        - noteTotal
    metadata:
      $ref: 'common.yaml#/metadata'
      readOnly: true
      description: The metadata
  required:
    - name
  example:
    id: 118dbd8c-5ba0-47a9-a850-34bbb1dbf3b7
    name: Important Note

noteTypeCollection:
  type: object
  title: Collection of note types
  description: Collection of note types
  properties:
    noteTypes:
      type: array
      items:
        $ref: '#/noteType'
    totalRecords:
      type: integer
      readOnly: true
      description: Total amount of note types
  required:
    - noteTypes
  example:
    noteTypes:
      - id: 118dbd8c-5ba0-47a9-a850-34bbb1dbf3b7
        name: Important Note
      - id: 46669e09-8b45-4ede-afbd-ca73bb89cdb3
        label: Urgent Note
    totalRecords: 2
