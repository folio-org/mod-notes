link:
  type: object
  title: Note link
  description: Link to object associated with a note
  properties:
    id:
      type: string
      description: Id of object linked to note
      x-fqm-value-getter: ${source}.object_id
      x-fqm-is-id-column: false # Despite the name, this is not the unique ID for the link record.
      x-fqm-visibility: "hidden"
      x-fqm-essential: true
      x-fqm-joins-to-raw:
        - targetId: bb058933-cd06-4539-bd3a-6f248ff98ee2
          targetField: id
          direction: left
          type: equality-cast-uuid
        - targetId: f2615ea6-450b-425d-804d-6a495afd9308
          targetField: id
          direction: left
          type: equality-cast-uuid
    type:
      type: string
      description: Type of object linked to note
      x-fqm-value-getter: ${source}.object_type
      x-fqm-visibility: "hidden"
      x-fqm-essential: true
  required:
    - id
    - type
  example:
    id: 1234-5678
    type: package

linkStatus:
  type: string
  enum: [ ASSIGNED, UNASSIGNED ]

linkStatusFilter:
  type: string
  enum: [ assigned, unassigned, all ]
  default: all

notesOrderBy:
  type: string
  enum: [title, content, noteType, updatedDate]

noteLinkUpdate:
  type: object
  description: A note link
  properties:
    id:
      description: A UUID identifying a note
      $ref: 'common.yaml#/uuid'
    status:
      description: New status for link to this note
      $ref: '#/linkStatus'
  required:
    - id
    - status

noteLinkUpdateCollection:
  type: object
  description: Collection of note links
  properties:
    notes:
      type: array
      items:
        $ref: '#/noteLinkUpdate'
  required:
    - notes